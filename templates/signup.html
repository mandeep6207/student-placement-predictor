{% extends "base.html" %}

{% block title %}Sign Up - PlacementIQ{% endblock %}

{% block content %}
  <section class="auth-wrap reveal-up">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="auth-sub">Start predicting placement chances with full history tracking.</p>
      <form method="post" class="row g-3 mt-1">
        <div class="col-12">
          <label for="username" class="form-label">Username</label>
          <input id="username" name="username" type="text" minlength="3" class="form-control" required />
        </div>
        <div class="col-12">
          <label for="password" class="form-label">Password</label>
          <input id="password" name="password" type="password" minlength="6" class="form-control" required />
        </div>
        <div class="col-12 d-grid mt-2">
          <button type="submit" class="btn btn-accent">Sign Up</button>
        </div>
      </form>
      <p class="mt-3 mb-0 small">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
    </div>
  </section>
{% endblock %}
